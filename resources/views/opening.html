<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening Animation — Prokar Elektronik</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;800;900&family=Archivo+Narrow:wght@500;700&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet" />

  <!-- tailwind.config sama dengan halaman lain agar token konsisten -->
  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "inverse-surface": "#303030",
            "secondary-container": "#fecb00",
            "on-secondary-container": "#6e5700",
            "secondary-fixed-dim": "#f1c100",
            "inverse-on-surface": "#f2f0f0",
            "tertiary-fixed-dim": "#c6c6c7",
            "primary": "#000000",
            "background": "#fbf9f8",
            "error": "#ba1a1a"
          },
          fontFamily: {
            "label-mono": ["Archivo Narrow"],
            "body-md": ["Public Sans"],
            "brand-display": ["Montserrat"]
          }
        }
      }
    };
  </script>

  <style>
    @keyframes logo-pop {
      0%   { opacity: 0; transform: scale(0.85); }
      60%  { opacity: 1; transform: scale(1.03); }
      100% { opacity: 1; transform: scale(1); }
    }
    .logo-pop { animation: logo-pop 480ms cubic-bezier(.22,1,.36,1) forwards; }

    .hazard-stripe {
      background-image: repeating-linear-gradient(45deg, #fecb00 0 14px, #1b1c1c 14px 28px);
    }

    /* Overlay fade-out: dikontrol via class, transisi pakai CSS biasa (bukan library JS) */
    .opening-overlay {
      transition: opacity 900ms ease, visibility 0ms 900ms;
    }
    .opening-overlay.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    [x-cloak] { display: none !important; }
  </style>
</head>

<body class="bg-background font-body-md">

  <div x-data="openingAnimation()" x-init="init()" class="relative min-h-screen w-full overflow-hidden">

    <!-- ===================== Placeholder Homepage (di production: konten home.blade.php yang sebenarnya) ===================== -->
    <div class="min-h-screen w-full flex flex-col items-center justify-center gap-unit-2 bg-background text-center px-6">
      <span class="font-label-mono text-[12px] uppercase tracking-widest text-on-surface-variant">[ Placeholder — diganti konten home.blade.php asli ]</span>
      <h1 class="font-brand-display font-extrabold text-4xl sm:text-5xl">Selamat datang di Prokar Elektronik</h1>
      <p class="text-on-surface-variant max-w-md">Homepage sebenarnya menyusul di sini — bagian ini cuma penanda supaya reveal opening animation kelihatan jelas.</p>
    </div>

    <!-- ===================== Overlay Opening Animation (Brutalist) ===================== -->
    <div
      x-cloak
      x-show="!skip"
      class="opening-overlay fixed inset-0 z-50 bg-primary flex flex-col"
      :class="{ 'is-hidden': phase === 'reveal' || phase === 'done' }"
    >
      <!-- Hazard stripe atas, signature element yang sama dengan panel login/register -->
      <div class="hazard-stripe h-2.5 w-full shrink-0" aria-hidden="true"></div>

      <!-- Frame brutalist: bracket sudut kuning ala viewfinder -->
      <div class="relative flex-grow flex items-center justify-center px-6">
        <span class="absolute top-6 left-6 w-8 h-8 border-t-4 border-l-4 border-secondary-container" aria-hidden="true"></span>
        <span class="absolute top-6 right-6 w-8 h-8 border-t-4 border-r-4 border-secondary-container" aria-hidden="true"></span>
        <span class="absolute bottom-6 left-6 w-8 h-8 border-b-4 border-l-4 border-secondary-container" aria-hidden="true"></span>
        <span class="absolute bottom-6 right-6 w-8 h-8 border-b-4 border-r-4 border-secondary-container" aria-hidden="true"></span>

        <!-- Teks/logo yang di-cycle -->
        <template x-for="(msg, i) in messages" :key="i">
          <div x-show="index === i" x-transition:enter="transition ease-out duration-700" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-500" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" class="text-center max-w-2xl">

            <template x-if="msg.type === 'line'">
              <p class="font-body-md text-inverse-on-surface text-xl sm:text-2xl md:text-3xl font-bold leading-snug px-4" x-text="msg.text"></p>
            </template>

            <template x-if="msg.type === 'logo'">
              <div class="logo-pop flex flex-col items-center gap-2">
                <span class="font-brand-display font-black uppercase tracking-tight text-secondary-container text-4xl sm:text-5xl md:text-6xl border-4 border-secondary-container px-6 py-3" x-text="msg.text"></span>
                <span class="font-label-mono text-[11px] uppercase tracking-[0.3em] text-tertiary-fixed-dim mt-2">Mlonggo &middot; Jepara</span>
              </div>
            </template>

          </div>
        </template>
      </div>

      <div class="hazard-stripe h-2.5 w-full shrink-0" aria-hidden="true"></div>
    </div>
  </div>

  <script>
    function openingAnimation() {
      return {
        phase: "intro", // intro -> reveal -> done
        index: 0,
        skip: false,
        messages: [
          { type: "line", text: "Elektronik rusak bukan akhir dari masa pakainya." },
          { type: "line", text: "Perbaiki. Jual. Beli. Dalam satu platform." },
          { type: "logo", text: "PROKAR ELEKTRONIK" }
        ],

        init() {
          const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

          let alreadyPlayed = false;
          try {
            alreadyPlayed = sessionStorage.getItem("prokar_opening_played") === "1";
          } catch (e) {
            // sessionStorage bisa gagal di private mode — anggap belum pernah main
          }

          if (prefersReducedMotion || alreadyPlayed) {
            this.skip = true;
            this.phase = "done";
            return;
          }

          this.runSequence();
        },

        runSequence() {
          const holdDurations = [1900, 1900, 2400]; // ms tahan tiap pesan — diperlambat agar lebih mudah dibaca
          const FADE_DURATION = 900; // harus sama dengan transition di CSS .opening-overlay

          const step = (i) => {
            this.index = i;
            window.setTimeout(() => {
              if (i < this.messages.length - 1) {
                step(i + 1);
              } else {
                this.phase = "reveal";
                window.setTimeout(() => {
                  this.phase = "done";
                  try {
                    sessionStorage.setItem("prokar_opening_played", "1");
                  } catch (e) {
                    /* ignore */
                  }
                }, FADE_DURATION);
              }
            }, holdDurations[i]);
          };

          step(0);
        }
      };
    }
  </script>
</body>
</html>
